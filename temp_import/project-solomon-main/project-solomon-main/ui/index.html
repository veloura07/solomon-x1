<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Solomon — local AI assistant interface" />
  <title>Solomon</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap"
    rel="stylesheet" />

  <!-- THREE.JS r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GSAP 3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- POSTPROCESSING (Phase 2 needs these) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
</head>

<body>

  <!-- THREE.JS renders into this -->
  <canvas id="solomon-canvas"></canvas>

  <!-- UI LABELS (CSS only, over canvas) -->
  <div id="ui-top">Solomon</div>
  <div id="ui-bottom">
    <span id="ui-status"></span>
    <span id="ui-sub"></span>
  </div>
  <div id="ui-ring-label"></div>

  <!-- TOOLTIP (shared, moved by JS) -->
  <div id="ring-tooltip"></div>

  <!-- PHASES — order matters, do not change -->
  <script src="js/phase1.js"></script>
  <script>
    // Prevent flash of uninitialized sigil/rings before boot.js runs
    const _origComposerRender = THREE.EffectComposer.prototype.render;
    THREE.EffectComposer.prototype.render = function(deltaTime) {
      if (typeof window.solomonBootComplete === 'undefined') return;
      _origComposerRender.call(this, deltaTime);
    };
  </script>
  <script src="js/phase2.js"></script>
  <script src="js/phase3.js"></script>
  <script src="js/boot.js"></script>
  <script src="js/warp.js"></script>
  <script src="js/solomon-ws.js"></script>

</body>

</html>
